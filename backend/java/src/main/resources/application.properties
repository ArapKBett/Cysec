# CyberVault Security Operations Platform
spring.application.name=CyberVault

# Server Configuration
server.port=8080
# Remove context-path for direct access at domain root
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Security Configuration
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Logging Configuration
logging.level.com.cybervault=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/cybervault.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Jackson Configuration (JSON)
spring.jackson.serialization.indent-output=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# HTTP Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Static Resource Configuration
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=31536000
spring.mvc.static-path-pattern=/static/**

# Actuator Configuration (Health Monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Application Information
info.app.name=CyberVault Security Platform
info.app.version=2.0.0
info.app.description=Advanced Cybersecurity Operations Terminal
info.app.author=Arap Bett

# CORS Configuration
cybervault.cors.allowed-origins=http://localhost:3000,https://cybervault.onrender.com
cybervault.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cybervault.cors.allowed-headers=*
cybervault.cors.allow-credentials=true

# File Processing Configuration
cybervault.file.max-size=100MB
cybervault.file.temp-dir=/tmp/cybervault
cybervault.process.timeout=30

# Security Settings
cybervault.security.rate-limit.requests-per-minute=60
cybervault.security.enable-request-logging=true
